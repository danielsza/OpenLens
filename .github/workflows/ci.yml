name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        # Run the reader tests against the committed synthetic fixture (no
        # personal photos) so CI exercises the real read paths.
        env:
          OPENLENS_TEST_LIBRARY: ${{ github.workspace }}/Tests/Fixtures/Mini.aplibrary
        run: swift test -v
